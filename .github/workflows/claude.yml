name: Claude CI/CD

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Run Claude Security Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          claude_args: |
            --allowedTools "Read,Grep,Glob,Bash(git:*),Bash(gh pr comment:*),mcp__github_inline_comment__create_inline_comment"
